name: Build & Deploy

# Runs only when code lands on a deployable branch (after PR merge or direct push).
# PR quality checks (lint, format, TypeScript, architecture) are handled separately
# by pr-checks.yml and must pass before any PR can be merged.
#
# This workflow deploys to Vercel, but first runs a small pre-deploy safety net
# for direct pushes that bypass the normal PR flow.

on:
  push:
    branches:
      - main # → deploys to Vercel Production
      - develop # → deploys to Vercel Preview

jobs:
  # ─── Job 1: Verify ───────────────────────────────────────────────────────────
  # Fast pre-deploy safety check. Ensures the code passes lint, format,
  # and production build verification before we attempt a deployment.
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Format
        run: npm run format:check

      - name: Build
        run: npm run build

  # ─── Job 2: Deploy ───────────────────────────────────────────────────────────
  # Deploys to Vercel only after the verify job passes.
  # main   → Production deployment
  # develop → Preview deployment
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify # verify must pass before deploy runs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (Preview)
        if: github.ref == 'refs/heads/develop'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --yes --token=$VERCEL_TOKEN
